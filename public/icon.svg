<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo bege com leve gradient pra dar profundidade -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBDDC0"/>
      <stop offset="100%" stop-color="#F0C997"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Símbolo (círculo + telhado + linha) centralizado em cima -->
  <g transform="translate(256, 196)">
    <!-- Círculo -->
    <circle cx="0" cy="0" r="118" stroke="#D55416" stroke-width="14" fill="none"/>
    <!-- Triângulo / telhado -->
    <path d="M -65 22 L 0 -60 L 65 22"
          stroke="#D55416" stroke-width="16" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Linha base do telhado -->
    <line x1="-65" y1="55" x2="65" y2="55"
          stroke="#5E3D17" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- Texto EKBALLO bem destacado -->
  <text x="256" y="408"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="78"
        font-weight="bold"
        fill="#5E3D17"
        text-anchor="middle"
        letter-spacing="4">EKBALLO</text>

  <!-- Tagline ACADEMY pequena embaixo -->
  <text x="256" y="452"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22"
        fill="#8B4513"
        text-anchor="middle"
        letter-spacing="14">ACADEMY</text>
</svg>
